apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scanner-app-hpa
  namespace: phishing-url-scanner
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scanner-app
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50